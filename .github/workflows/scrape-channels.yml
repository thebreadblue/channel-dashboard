name: 판매채널 데이터 수집

on:
  schedule:
    - cron: "0 */1 * * *"   # 1시간마다 실행 (UTC 기준)
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 판매채널 스크래핑 실행
        env:
          # 스마트스토어
          SMARTSTORE_ID: ${{ secrets.SMARTSTORE_ID }}
          SMARTSTORE_PW: ${{ secrets.SMARTSTORE_PW }}
          SMARTSTORE_COOKIES: ${{ secrets.SMARTSTORE_COOKIES }}
          SMARTSTORE_CLIENT_ID: ${{ secrets.SMARTSTORE_CLIENT_ID }}
          SMARTSTORE_CLIENT_SECRET: ${{ secrets.SMARTSTORE_CLIENT_SECRET }}
          # 카카오
          KAKAO_ID: ${{ secrets.KAKAO_ID }}
          KAKAO_PW: ${{ secrets.KAKAO_PW }}
          KAKAO_COOKIES: ${{ secrets.KAKAO_COOKIES }}
          # ESM+
          GMARKET_ID: ${{ secrets.GMARKET_ID }}
          GMARKET_PW: ${{ secrets.GMARKET_PW }}
          GMARKET_COOKIES: ${{ secrets.GMARKET_COOKIES }}
          # 11번가
          ELEVEN_ID: ${{ secrets.ELEVEN_ID }}
          ELEVEN_PW: ${{ secrets.ELEVEN_PW }}
          ELEVEN_COOKIES: ${{ secrets.ELEVEN_COOKIES }}
          # 토스쇼핑
          TOSS_ID: ${{ secrets.TOSS_ID }}
          TOSS_PW: ${{ secrets.TOSS_PW }}
          TOSS_COOKIES: ${{ secrets.TOSS_COOKIES }}
          # 와디즈
          WADIZ_ID: ${{ secrets.WADIZ_ID }}
          WADIZ_PW: ${{ secrets.WADIZ_PW }}
          WADIZ_COOKIES: ${{ secrets.WADIZ_COOKIES }}
          # 알리익스프레스
          ALIEXPRESS_ID: ${{ secrets.ALIEXPRESS_ID }}
          ALIEXPRESS_PW: ${{ secrets.ALIEXPRESS_PW }}
          ALI_COOKIES: ${{ secrets.ALI_COOKIES }}
          # 오아이스
          OASIS_ID: ${{ secrets.OASIS_ID }}
          OASIS_PW: ${{ secrets.OASIS_PW }}
          OASIS_COOKIES: ${{ secrets.OASIS_COOKIES }}
        run: python main.py

      - name: 오류 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "Channel Bot"
          git config user.email "bot@thebreadblue.com"
          git add "data/results.json"
          git diff --staged --quiet || git commit -m "chore: 판매채널 데이터 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
